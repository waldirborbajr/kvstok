# .github/typos.toml
# Configuration for crate-ci/typos (spell checker)

[default]
# Extend the default dictionary
extend-ignore-re = [
    # Ignore common code patterns
    "\\b[A-Fa-f0-9]{8,}\\b",           # hex strings
    "\\b[0-9a-f]{40,}\\b",             # longer hashes
]

# Case insensitive by default
case-sensitive = false

# Ignore files and directories
ignore-files = [
    "go.sum",
    "go.mod",
    "*.min.js",
    "*.svg",
]

[default.extend-words]
# Project specific words (add here words that typos should accept)
kvstok = "kvstok"
waldir = "waldir"
borbajr = "borbajr"
goreleaser = "goreleaser"
codeql = "codeql"
argon2 = "argon2"
aesgcm = "aesgcm"
secretbox = "secretbox"
cli = "cli"
json = "json"
yaml = "yaml"
toml = "toml"
sqlite = "sqlite"
bolt = "bolt"
bbolt = "bbolt"

# Common technical terms
keyvalue = "keyvalue"
keyval = "keyval"
subcommand = "subcommand"
subcommands = "subcommands"
autocompletion = "autocompletion"
zshell = "zshell"
fishshell = "fishshell"

# Go specific
golang = "golang"
goroutine = "goroutine"
goroutines = "goroutines"
mutex = "mutex"
chan = "chan"

[files]
# Ignore specific file types if needed
extend-exclude = [
    "*.json",
    "*.lock",
    "vendor/**",
    "dist/**",
    ".git/**",
]

# You can add type-specific configurations
[type.go]
extend-ignore-re = [
    # Ignore Go struct tags
    "`[^`]+`",
]

[type.md]
extend-ignore-re = [
    # Ignore markdown code blocks
    "```[\\s\\S]*?```",
]

# Add more words as the project grows
[[words]]
word = "kvstok"
case-sensitive = false