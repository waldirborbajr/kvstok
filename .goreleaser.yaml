# .goreleaser.yml
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: kvstok

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...

builds:
  - id: kvstok
    binary: kvstok

    env:
      - CGO_ENABLED=0

    # Supported operating systems.
    # Windows is intentionally disabled.
    # To enable Windows releases in the future,
    # uncomment "windows" below.
    goos:
      - linux
      - darwin
      # - windows

    # Supported CPU architectures.
    goarch:
      - amd64
      - arm64

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
      - -X main.builtBy=goreleaser

    flags:
      - -trimpath

# Create a universal macOS binary containing both
# amd64 (Intel) and arm64 (Apple Silicon).
universal_binaries:
  - id: kvstok-universal
    ids:
      - kvstok
    replace: true

archives:
  - id: default
    formats:
      - tar.gz

    # Artifact naming convention:
    # kvstok_0.5.0_linux_amd64.tar.gz
    # kvstok_0.5.0_linux_arm64.tar.gz
    # kvstok_0.5.0_darwin_amd64.tar.gz
    # kvstok_0.5.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

    # If Windows support is re-enabled,
    # uncomment the override below to generate ZIP archives.
    #
    # format_overrides:
    #   - goos: windows
    #     format: zip

    files:
      - LICENSE
      - README.md
# 
      - CONTRIBUTORS.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github

  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew Tap
brews:
  - name: kvstok

    homepage: "https://github.com/waldirborbajr/kvstok"
    description: "Fast, secure and simple key-value store for the terminal"
    license: "MIT"

    directory: Formula

    repository:
      owner: waldirborbajr
      name: homebrew-kvstok
      branch: main

    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com

    commit_msg_template: >-
      Brew formula update for {{ .ProjectName }}
      version {{ .Tag }}

    install: |
      bin.install "kvstok"

      zsh_completion.install \
        "completions/{{ .ProjectName }}.zsh" => "{{ .ProjectName }}"

      bash_completion.install \
        "completions/{{ .ProjectName }}.bash" => "{{ .ProjectName }}"

      fish_completion.install \
        "completions/{{ .ProjectName }}.fish" => "{{ .ProjectName }}"

# Optional Scoop support (Windows)
#
# Uncomment this section if Windows builds are enabled.
