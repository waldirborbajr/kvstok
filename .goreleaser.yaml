# .goreleaser.yml
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
project_name: kvstok

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...

builds:
  - id: kvstok
    binary: kvstok
    env:
      - CGO_ENABLED=0

    # Supported OS
    goos:
      - linux
      - darwin
      # - windows   # Enable Windows in future if needed

    # Supported architectures
    goarch:
      - amd64      # Linux Intel / x86_64 servers
      - 386        # Linux 32-bit legacy
      - arm64      # Linux ARM / Raspberry Pi / macOS Apple Silicon
      # Windows support commented out
      # - amd64
      # - 386
      # - arm64

    # Ignore Intel macOS
    ignore:
      - goos: darwin
        goarch: amd64

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
      - -X main.builtBy=goreleaser

    flags:
      - -trimpath

# Archives
archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - CONTRIBUTORS.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

sbom:
  artifacts: archive

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# Homebrew Tap
brews:
  - name: kvstok
    homepage: "https://github.com/waldirborbajr/kvstok"
    description: "Fast, secure and simple key-value store for the terminal"
    license: "MIT"
    directory: Formula
    repository:
      owner: waldirborbajr
      name: homebrew-kvstok
      branch: main
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "kvstok"
      zsh_completion.install "completions/{{ .ProjectName }}.zsh" => "{{ .ProjectName }}"
      bash_completion.install "completions/{{ .ProjectName }}.bash" => "{{ .ProjectName }}"
      fish_completion.install "completions/{{ .ProjectName }}.fish" => "{{ .ProjectName }}"

