# .goreleaser.yml
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: kvstok

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...

builds:
  - id: kvstok
    binary: kvstok

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin
      # - windows  # uncomment when ready

    goarch:
      - amd64
      - arm64

    # Security + smaller binary
    buildmode: pie                    # Position Independent Executable (ASLR)

    flags:
      - -trimpath

    ldflags:
      - -s -w
      - -linkmode=external
      - -extldflags="-static-pie"     # Fully static + PIE (strong security)
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}   # Better than .Date
      - -X main.builtBy=goreleaser

    # Reproducible builds
    mod_timestamp: "{{ .CommitTimestamp }}"

# Universal macOS binary
universal_binaries:
  - id: kvstok-universal
    ids:
      - kvstok
    replace: true

# ==================== RELEASE ====================
release:
  draft: true       # Cria a release como draft, não será "latest"
  prerelease: false # opcional: define se é pre-release
  make_latest: false # evita que seja automaticamente a última release

# ==================== SIZE OPTIMIZATION ====================
upx:
  - compress: best
  
archives:
  - id: default
    formats:
      - tar.gz

    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

    files:
      - LICENSE
      - README.md
      - CONTRIBUTORS.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

# ==================== SECURITY ====================
# Optional but recommended: Generate SBOM (Software Bill of Materials)
sboms:
  - artifacts: archive     # or "binary"

# Signing (add cosign to your CI for strong supply-chain security)
# signs:
#   - artifacts: all
#     args:
#       - "--key=env://COSIGN_PRIVATE_KEY"
#     output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: kvstok
    homepage: "https://github.com/waldirborbajr/kvstok"
    description: "Fast, secure and simple key-value store for the terminal"
    license: "MIT"
    url_template: "https://github.com/waldirborbajr/kvstok/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: o
      name: homebrew-kvstok
      branch: main
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    install: |
      bin.install "kvstok"
      zsh_completion.install "completions/{{ .ProjectName }}.zsh" => "{{ .ProjectName }}"
      bash_completion.install "completions/{{ .ProjectName }}.bash" => "{{ .ProjectName }}"
      fish_completion.install "completions/{{ .ProjectName }}.fish" => "{{ .ProjectName }}"

# Optional: Docker images (highly recommended for security + size)
