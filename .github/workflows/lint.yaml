# .github/workflows/lint.yaml
name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"

  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - name: Verify modules
        run: |
          go mod verify
          go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0
          args: --timeout=5m
          only-new-issues: true          # Muito bom para PRs
          skip-cache: false

      - name: Check formatting and tidy
        run: |
          STATUS=0

          if ! go fmt ./...; then
            echo "::error::go fmt found changes. Please run 'go fmt ./...'"
            STATUS=1
          fi

          if ! go mod tidy -diff; then
            echo "::error::go.mod/go.sum is not tidy. Run 'go mod tidy'"
            STATUS=1
          fi

          exit $STATUS