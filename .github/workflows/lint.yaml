# .github/workflows/lint.yaml
name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"

  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l ./...)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not formatted. Run 'gofmt -w ./...'"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod/go.sum is not tidy. Run 'go mod tidy'"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8  # pin to a specific version for reproducibility
          args: --timeout=5m
          only-new-issues: true