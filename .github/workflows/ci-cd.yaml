name: CI/CD - Test, Build & Publish
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags:
      - "v*"
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # 1º Job - Verificações rápidas de compilação e estática
  build:
    name: Build & Vet Check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
      max-parallel: 1
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libx11-dev
      - name: Verify modules
        run: go mod tidy -diff
      - name: Build project
        run: go build -v ./...
      - name: Run go vet
        run: go vet ./...
  # 2º Job - Testes (só roda se Build + Vet passar)
  tests:
    name: Test (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
      max-parallel: 1
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libx11-dev
      - name: Run tests
        run: go test -v -race ./... -coverprofile=coverage.txt -covermode=atomic -timeout=90s
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
  # 3º Job - Release (só em tags)
  goreleaser:
    name: Build & Publish Release
    needs: [build, tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install X11 dependencies
        run: sudo apt-get update -q && sudo apt-get install -y libx11-dev
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
