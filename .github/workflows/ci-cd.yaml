# .github/workflows/ci-cd.yaml
name: CI/CD - Test, Build & Publish

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1º Job - Mais rápido (falha rápido se não compilar)
  build:
    name: Build Check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - name: Verify modules
        run: go mod tidy -diff

      - name: Build project
        run: go build -v ./...

  # 2º Job - Só roda se o Build passar
  tests:
    name: Test (${{ matrix.os }})
    needs: build                    # ← Dependência importante
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v -race ./... -coverprofile=coverage.txt -covermode=atomic -timeout=90s

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  # 3º Job - Só roda em releases (tags) e após build + tests
  goreleaser:
    name: Build & Publish Release
    needs: [build, tests]           # ← Depende dos dois jobs anteriores
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}