name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # packages: write     # uncomment if you add Docker later
  # id-token: write     # for cosign/OIDC signing

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y libx11-dev

      - name: Verify Go modules
        run: go mod tidy -diff

      - name: Build project
        run: go build -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run tests (skip clipboard)
        run: |
          go test \
            -race \
            $(go list ./... | grep -v clipboard) \
            -timeout=90s

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2   # or "latest"
          args: --timeout=5m

      # Important: Validate GoReleaser config before releasing
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: check

  release:
    name: Publish Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y libx11-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7   # ← Updated
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}