name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum
      - name: Install system dependencies
        run: sudo apt-get install -y libx11-dev
      - name: Verify modules
        run: go mod tidy -diff
      - name: Build project
        run: go build -v ./...
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test -race $(go list ./... | grep -v clipboard) -timeout=90s
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0
          args: --timeout=5m
      - name: Typo Check
        uses: crate-ci/typos@v1.47.0
        with:
          config: .github/typos.toml

  create-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Preparing release: v${VERSION}"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: kvstok v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## kvstok v${{ steps.get_version.outputs.version }}
            Fast, secure and simple key-value store for the terminal.

  goreleaser:
    name: GoReleaser Publish
    needs: [validate, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Install system dependencies
        run: sudo apt-get install -y libx11-dev
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
