# .github/workflows/typo-check.yaml
name: Typo Check

on:
  pull_request:        # ← importante
    branches: [main]
  push:
    branches: [main]
  workflow_call:       # mantém compatibilidade

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for typos
        uses: crate-ci/typos@v1.46.3
        with:
          config: .github/typos.toml