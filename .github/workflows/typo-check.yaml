# .github/workflows/typo-check.yaml
name: Typo Check

on:
  workflow_call:
  pull_request:
    paths:
      - "**/*"

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for typos
        uses: crate-ci/typos@v1.30.0
        with:
          config: ./.github/typos.toml   # optional